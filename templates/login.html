{% extends "base.html" %}
{% block title %}Ielogoties{% endblock %}
{% block content %}
<div class="auth-container">
    <h2>Ielogoties</h2>
    <div class="form-group">
        <form action="/login" method="POST">
            <label>Lietotājvārds</label>
            <input type="text" name="user" required>
            <label style="margin-top:15px; display:block;">Parole</label>
            <input type="password" name="pass" required>
            <button type="submit" class="btn" style="margin-top:20px;">Ieiet</button>
        </form>
    </div>
    <p>Nav konta? <a href="/register">Reģistrējies šeit</a></p>
</div>
{% endblock %}
