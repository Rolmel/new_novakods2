{% extends "base.html" %}
{% block title %}⚔️ Dueļi{% endblock %}
{% block content %}
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Rajdhani:wght@400;600&display=swap');
:root { --gold:#f5c842; --dark:#0a0a0f; --green:#00e676; --red:#ff1744; --blue:#2196f3; }
body { background:var(--dark); color:#e0e0e0; font-family:'Rajdhani',sans-serif; }
.page { max-width:860px; margin:0 auto; padding:24px 20px; }
h1 { font-family:'Cinzel Decorative',serif; color:var(--gold); text-align:center;
     text-shadow:0 0 30px #f5c84244; margin-bottom:6px; }
.balance-bar { text-align:center; color:var(--gold); font-size:1.1rem; margin-bottom:24px; font-weight:600; }
.tabs { display:flex; gap:4px; margin-bottom:20px; }
.tab { padding:8px 20px; border-radius:8px; border:1px solid #2a2a3a; background:#111118;
       color:#888; cursor:pointer; font-family:'Rajdhani',sans-serif; font-size:0.9rem;
       font-weight:600; transition:all .15s; }
.tab.active { border-color:var(--gold); color:var(--gold); background:#1a1a0a; }
.tab-section { display:none; }
.tab-section.active { display:block; }
.duel-card {
  background:#111118; border:1px solid #2a2a3a; border-radius:14px;
  padding:18px 20px; margin-bottom:12px; transition:border-color .2s;
}
.duel-card:hover { border-color:#4a4a6a; }
.duel-card.pending  { border-left:3px solid var(--gold); }
.duel-card.accepted { border-left:3px solid var(--blue); }
.duel-card.resolved { border-left:3px solid #333; opacity:.7; }
.duel-card.declined { border-left:3px solid var(--red); opacity:.6; }
.duel-top { display:flex; justify-content:space-between; align-items:flex-start; gap:12px; flex-wrap:wrap; }
.duel-event { font-size:0.82rem; color:#888; margin-bottom:6px; }
.duel-title { font-weight:700; font-size:1rem; color:#e0e0e0; margin-bottom:10px; }
.duel-vs { display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
.duel-player {
  background:#0a0a14; border:1px solid #2a2a3a; border-radius:8px;
  padding:8px 14px; font-size:0.85rem; flex:1; min-width:120px;
}
.duel-player .name { color:var(--gold); font-weight:700; }
.duel-player .option { color:#888; font-size:0.78rem; margin-top:2px; }
.duel-player.winner { border-color:var(--green); background:#00e67611; }
.duel-player.loser  { border-color:var(--red);   background:#ff174411; }
.vs-badge {
  font-weight:700; color:#555; font-size:0.9rem; flex-shrink:0;
}
.stake-badge {
  display:inline-block; padding:3px 12px; border-radius:20px;
  background:#f5c84218; border:1px solid #f5c84244; color:var(--gold);
  font-size:0.8rem; font-weight:700;
}
.status-badge {
  display:inline-block; padding:3px 12px; border-radius:20px;
  font-size:0.75rem; font-weight:700;
}
.s-pending  { background:#f5c84218; border:1px solid #f5c84244; color:var(--gold); }
.s-accepted { background:#2196f318; border:1px solid #2196f344; color:var(--blue); }
.s-resolved { background:#1a1a24;   border:1px solid #333;      color:#555; }
.s-declined { background:#ff174418; border:1px solid #ff174444; color:var(--red); }
.duel-actions { display:flex; gap:8px; margin-top:12px; flex-wrap:wrap; }
.btn-accept {
  padding:8px 20px; background:linear-gradient(135deg,#00e676,#00b34a);
  border:none; border-radius:8px; color:#000; font-weight:700;
  font-family:'Rajdhani',sans-serif; cursor:pointer; font-size:0.9rem;
}
.btn-decline {
  padding:8px 20px; background:#1a0a0a; border:1px solid #3a1a1a;
  border-radius:8px; color:#ff6666; font-weight:700;
  font-family:'Rajdhani',sans-serif; cursor:pointer; font-size:0.9rem;
}
.btn-view {
  padding:8px 20px; background:#1a1a2e; border:1px solid #333;
  border-radius:8px; color:#aaa; font-weight:700;
  font-family:'Rajdhani',sans-serif; cursor:pointer; font-size:0.9rem;
  text-decoration:none; display:inline-block;
}
.accept-panel {
  margin-top:12px; padding:14px; background:#0a0a14;
  border:1px solid #2a2a3a; border-radius:10px; display:none;
}
.accept-panel select {
  width:100%; padding:9px 12px; background:#111118; border:1px solid #333;
  border-radius:8px; color:#fff; font-family:'Rajdhani',sans-serif;
  font-size:0.9rem; margin-bottom:10px;
}
.empty { text-align:center; color:#333; padding:60px; }
.result-msg { padding:8px 14px; border-radius:8px; margin-top:8px;
              font-weight:600; font-size:0.85rem; display:none; }
.ok  { background:#00e67622; border:1px solid var(--green); color:var(--green); }
.err { background:#ff174422; border:1px solid var(--red); color:#ff8888; }
.pending-dot {
  display:inline-block; width:8px; height:8px; border-radius:50%;
  background:var(--gold); margin-right:6px; animation:blink 1.5s ease infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }
.stats-row {
  display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
  gap:12px; margin-bottom:24px;
}
.stat-card {
  background:#111118; border:1px solid #2a2a3a; border-radius:12px;
  padding:16px; text-align:center;
}
.stat-val { font-size:1.5rem; font-weight:700; color:var(--gold); }
.stat-lbl { font-size:0.72rem; color:#555; text-transform:uppercase; letter-spacing:1px; margin-top:4px; }
</style>

<div class="page">
  <h1>⚔️ Dueļi</h1>
  <div class="balance-bar">💰 <span id="balance">{{ "%.2f"|format(balance) }}</span> coins</div>

  <div class="stats-row" id="stats-row">
    <div class="stat-card"><div class="stat-val" id="stat-total">—</div><div class="stat-lbl">Kopā dueļi</div></div>
    <div class="stat-card"><div class="stat-val" id="stat-wins" style="color:var(--green)">—</div><div class="stat-lbl">Uzvaras</div></div>
    <div class="stat-card"><div class="stat-val" id="stat-losses" style="color:var(--red)">—</div><div class="stat-lbl">Zaudējumi</div></div>
    <div class="stat-card"><div class="stat-val" id="stat-profit">—</div><div class="stat-lbl">Neto peļņa</div></div>
    <div class="stat-card"><div class="stat-val" id="stat-pending" style="color:var(--gold)">—</div><div class="stat-lbl">Gaida atbildi</div></div>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('incoming',this)">
      <span class="pending-dot" id="incoming-dot" style="display:none"></span>Ienākošie
    </div>
    <div class="tab" onclick="switchTab('outgoing',this)">Nosūtītie</div>
    <div class="tab" onclick="switchTab('active',this)">Aktīvie</div>
    <div class="tab" onclick="switchTab('history',this)">Vēsture</div>
  </div>

  <div class="tab-section active" id="tab-incoming">
    <div id="list-incoming"></div>
  </div>
  <div class="tab-section" id="tab-outgoing">
    <div id="list-outgoing"></div>
  </div>
  <div class="tab-section" id="tab-active">
    <div id="list-active"></div>
  </div>
  <div class="tab-section" id="tab-history">
    <div id="list-history"></div>
  </div>
</div>

<script>
const MY_ID = {{ session.user_id }};
let allDuels = [];

function switchTab(name, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-section').forEach(s => s.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');
}

async function loadDuels() {
  const res  = await fetch('/api/duels/mine');
  const data = await res.json();
  allDuels   = data.duels || [];

  const incoming = allDuels.filter(d => d.opponent_id === MY_ID && d.status === 'pending');
  const outgoing = allDuels.filter(d => d.challenger_id === MY_ID && d.status === 'pending');
  const active   = allDuels.filter(d => d.status === 'accepted');
  const history  = allDuels.filter(d => ['resolved','declined'].includes(d.status));

  renderList('incoming', incoming, true);
  renderList('outgoing', outgoing, false);
  renderList('active',   active,   false);
  renderList('history',  history,  false);

  const dot = document.getElementById('incoming-dot');
  dot.style.display = incoming.length > 0 ? 'inline-block' : 'none';

  const resolved = allDuels.filter(d => d.status === 'resolved');
  const wins     = resolved.filter(d => d.winner_id === MY_ID).length;
  const losses   = resolved.filter(d => d.winner_id && d.winner_id !== MY_ID).length;
  const profit   = resolved.reduce((sum, d) => {
    if (d.winner_id === MY_ID) return sum + d.stake;
    if (d.winner_id && d.winner_id !== MY_ID) return sum - d.stake;
    return sum;
  }, 0);
  const pending  = allDuels.filter(d => d.status === 'pending').length;

  document.getElementById('stat-total').textContent   = resolved.length;
  document.getElementById('stat-wins').textContent    = wins;
  document.getElementById('stat-losses').textContent  = losses;
  document.getElementById('stat-profit').textContent  = (profit >= 0 ? '+' : '') + profit;
  document.getElementById('stat-profit').style.color  = profit >= 0 ? 'var(--green)' : 'var(--red)';
  document.getElementById('stat-pending').textContent = pending;
}

function renderList(type, duels, showAcceptForm) {
  const el = document.getElementById('list-' + type);
  if (!duels.length) {
    el.innerHTML = `<div class="empty"><div style="font-size:2.5rem;margin-bottom:12px;">⚔️</div>Nav ${type === 'incoming' ? 'ienākošu' : type === 'outgoing' ? 'nosūtītu' : type === 'active' ? 'aktīvu' : 'iepriekšēju'} dueļu.</div>`;
    return;
  }
  el.innerHTML = duels.map(d => buildCard(d, showAcceptForm)).join('');
}

function buildCard(d, showAcceptForm) {
  const isChallenger = d.challenger_id === MY_ID;
  const myOption     = isChallenger ? d.challenger_label : (d.opponent_label || '?');
  const theirOption  = isChallenger ? (d.opponent_label || '?') : d.challenger_label;
  const theirName    = isChallenger ? d.opponent_name : d.challenger_name;
  const myName       = isChallenger ? d.challenger_name : d.opponent_name;

  let myClass    = '';
  let theirClass = '';
  if (d.status === 'resolved') {
    myClass    = d.winner_id === MY_ID ? 'winner' : 'loser';
    theirClass = d.winner_id === MY_ID ? 'loser'  : 'winner';
  }

  const statusMap = {
    pending:  '<span class="status-badge s-pending">⏳ Gaida</span>',
    accepted: '<span class="status-badge s-accepted">🔵 Aktīvs</span>',
    resolved: d.winner_id === MY_ID
      ? '<span class="status-badge" style="background:#00e67618;border:1px solid var(--green);color:var(--green)">🏆 Uzvara</span>'
      : '<span class="status-badge s-resolved">💀 Zaudējums</span>',
    declined: '<span class="status-badge s-declined">❌ Noraidīts</span>',
  };

  const acceptSection = showAcceptForm ? `
    <div class="accept-panel" id="ap-${d.id}">
      <div style="font-size:0.82rem;color:#888;margin-bottom:8px;">
        Izvēlies savu opciju (nevar būt "${d.challenger_label}"):
      </div>
      <select id="sel-${d.id}"></select>
      <div style="display:flex;gap:8px;">
        <button class="btn-accept" onclick="acceptDuel(${d.id})">✅ Pieņemt</button>
        <button class="btn-decline" onclick="declineDuel(${d.id})">❌ Noraidīt</button>
      </div>
      <div class="result-msg" id="msg-${d.id}"></div>
    </div>` : '';

  const actions = showAcceptForm ? `
    <div class="duel-actions">
      <button class="btn-accept" onclick="toggleAccept(${d.id}, ${d.event_id}, '${d.challenger_label}')">⚔️ Atbildēt</button>
      <a class="btn-view" href="/predictions/${d.event_id}">👁️ Notikums</a>
    </div>` :
    d.status !== 'resolved' && d.status !== 'declined' ? `
    <div class="duel-actions">
      <a class="btn-view" href="/predictions/${d.event_id}">👁️ Notikums</a>
    </div>` : `
    <div class="duel-actions">
      <a class="btn-view" href="/predictions/${d.event_id}">👁️ Notikums</a>
    </div>`;

  return `
    <div class="duel-card ${d.status}" id="dcard-${d.id}">
      <div class="duel-top">
        <div style="flex:1;">
          <div class="duel-event">📈 ${d.event_title}</div>
          <div class="duel-vs">
            <div class="duel-player ${myClass}">
              <div class="name">${myName} ${isChallenger ? '(Tu)' : ''}</div>
              <div class="option">${myOption}</div>
            </div>
            <div class="vs-badge">VS</div>
            <div class="duel-player ${theirClass}">
              <div class="name">${theirName} ${!isChallenger ? '(Tu)' : ''}</div>
              <div class="option">${theirOption}</div>
            </div>
          </div>
        </div>
        <div style="text-align:right;display:flex;flex-direction:column;gap:6px;align-items:flex-end;">
          <span class="stake-badge">⚔️ ${d.stake} coins</span>
          ${statusMap[d.status] || ''}
        </div>
      </div>
      ${actions}
      ${acceptSection}
    </div>`;
}

async function toggleAccept(duelId, eventId, challengerLabel) {
  const panel = document.getElementById('ap-' + duelId);
  if (panel.style.display === 'block') {
    panel.style.display = 'none';
    return;
  }
  const res     = await fetch(`/predictions/${eventId}`);
  const optRes  = await fetch(`/api/predictions/options/${eventId}`);
  const optData = await optRes.json();
  const sel     = document.getElementById('sel-' + duelId);
  sel.innerHTML = optData.options
    .filter(o => o.label !== challengerLabel)
    .map(o => `<option value="${o.id}">${o.label}</option>`)
    .join('');
  panel.style.display = 'block';
}

async function acceptDuel(duelId) {
  const optionId = parseInt(document.getElementById('sel-' + duelId).value);
  const msg      = document.getElementById('msg-' + duelId);
  msg.style.display = 'block';
  msg.textContent   = '⏳ Apstrādā...';
  msg.className     = 'result-msg';

  const res  = await fetch(`/api/duels/${duelId}/accept`, {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ option_id: optionId })
  });
  const data = await res.json();
  if (data.ok) {
    msg.className   = 'result-msg ok';
    msg.textContent = '✅ Duelis pieņemts!';
    setTimeout(loadDuels, 1200);
  } else {
    msg.className   = 'result-msg err';
    msg.textContent = '❌ ' + data.error;
  }
}

async function declineDuel(duelId) {
  const msg = document.getElementById('msg-' + duelId);
  msg.style.display = 'block';
  msg.textContent   = '⏳ Apstrādā...';
  msg.className     = 'result-msg';

  const res  = await fetch(`/api/duels/${duelId}/decline`, { method:'POST' });
  const data = await res.json();
  if (data.ok) {
    msg.className   = 'result-msg ok';
    msg.textContent = '✅ Noraidīts.';
    setTimeout(loadDuels, 1000);
  } else {
    msg.className   = 'result-msg err';
    msg.textContent = '❌ ' + data.error;
  }
}

loadDuels();
setInterval(loadDuels, 15000);
</script>
{% endblock %}
